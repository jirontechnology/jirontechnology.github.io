
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiron Technology | Innovación desde Nicaragua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #fff; /* Fondo blanco para el logo si es transparente */
            margin-bottom: 20px;
            object-fit: cover;
            border: 3px solid #00d2ff;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .badge {
            display: inline-block;
            background: #00d2ff;
            color: #000;
            padding: 4px 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.7rem;
            margin-bottom: 15px;
        }
        .description {
            font-size: 1rem;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn i {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        .whatsapp { background-color: #25d366; }
        .telegram { background-color: #0088cc; }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://via.placeholder.com/150" alt="Logo Jiron Technology" class="logo">
        
        <div class="badge">SITIO OFICIAL</div>
        <h1>JIRON TECHNOLOGY</h1>
        <p class="description">Soluciones tecnológicas e innovación digital.</p>

        <a href="https://wa.me/50587241362" class="btn whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

        <a href="https://t.me/JTBsomotillo" class="btn telegram" target="_blank">
            <i class="fab fa-telegram-plane"></i> Telegram
        </a>

        <div class="footer">
            <p>Somotillo, Chinandega 🇳🇮</p>
        </div>
    </div>
</body>
</html>
