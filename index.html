
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiron Technology | Innovación desde Nicaragua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }
        .container {
            width: 90%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 2px solid #00d2ff;
            background: white; /* Por si el logo es oscuro */
        }
        h1 { font-size: 1.8rem; margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        .description { opacity: 0.8; margin-bottom: 25px; }

        /* SECCIÓN SERVICIOS */
        .services {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
            text-align: left;
        }
        .service-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
        }
        .service-item i { color: #00d2ff; margin-right: 5px; }

        /* BOTONES */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .whatsapp { background: #25d366; }
        .telegram { background: #0088cc; }
        .btn:hover { transform: scale(1.03); }

        .footer { margin-top: 20px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="JT" class="logo" onerror="this.src='https://via.placeholder.com/100?text=JT'">
        
        <h1>JIRON TECHNOLOGY</h1>
        <p class="description">Innovación y Soluciones Digitales</p>

        <div class="services">
            <div class="service-item"><i class="fas fa-tools"></i> Soporte Técnico</div>
            <div class="service-item"><i class="fas fa-code"></i> Desarrollo Web</div>
            <div class="service-item"><i class="fas fa-mobile-alt"></i> Venta de Celulares</div>
            <div class="service-item"><i class="fas fa-network-wired"></i> Redes y Wifi</div>
        </div>

        <a href="https://wa.me/50587241362" class="btn whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> Contactar por WhatsApp
        </a>

        <a href="https://t.me/JTBsomotillo" class="btn telegram" target="_blank">
            <i class="fab fa-telegram-plane"></i> Unirse a Telegram
        </a>

        <div class="footer">
            <p>📍 Somotillo, Chinandega, Nicaragua 🇳🇮</p>
            <p>&copy; 2026 Jiron Technology</p>
        </div>
    </div>
</body>
</html>
