
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiron Technology | Servicio Técnico Somotillo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #00d2ff;
            background: #fff;
            object-fit: contain;
        }
        h1 { font-size: 1.6rem; margin: 10px 0; text-transform: uppercase; color: #00d2ff; }
        
        .services-list {
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .service-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .service-item i { color: #00d2ff; margin-right: 12px; width: 20px; text-align: center; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .whatsapp { background: #25d366; }
        .telegram { background: #0088cc; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .footer { margin-top: 20px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Jiron Technology" class="logo" onerror="this.src='https://via.placeholder.com/120x120?text=LOGO'">
        
        <h1>JIRON TECHNOLOGY</h1>
        <p style="margin-bottom: 20px; opacity: 0.8;">Servicio Técnico Especializado</p>

        <div class="services-list">
            <div class="service-item"><i class="fas fa-mobile-alt"></i> Reparación de celulares</div>
            <div class="service-item"><i class="fas fa-hammer"></i> Cambio de pantalla</div>
            <div class="service-item"><i class="fas fa-unlock-alt"></i> Desbloqueo por operadora</div>
            <div class="service-item"><i class="fas fa-sync-alt"></i> Actualización de software</div>
            <div class="service-item"><i class="fas fa-headphones"></i> Venta de accesorios</div>
        </div>

        <a href="https://wa.me/50587241362" class="btn whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

        <a href="https://t.me/JTBsomotillo" class="btn telegram" target="_blank">
            <i class="fab fa-telegram-plane"></i> Telegram
        </a>

        <div class="footer">
            <p>📍 Somotillo, Chinandega, Nicaragua 🇳🇮</p>
            <p>&copy; 2026 Jiron Technology</p>
        </div>
    </div>
</body>
</html>
